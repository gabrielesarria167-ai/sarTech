<!DOCTYPE html>

<html lang="it">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Assistenza</title>
    <link rel="stylesheet" href="../styles.css">
    <link rel="shortcut icon" type="image/x-icon" href="../sarTech.ico">
    <script src="../script.js" defer></script>
    <script src="../scripts/devices.js" defer></script>
    <script src="../scripts/assistenza.js" defer></script>

</head>

<body id="assistenza">
    <div id="header">
        <div id="logos">
            <img src="../img/sarTech.png" class="logo">
            <img src="../img/sarTech-short.png" class="short-logo">
        </div>
        <ul class="quick-links">
            <li><a href="pages/chi-siamo.html">Chi siamo</a></li>
            <li><a href="pages/contattaci.html">Contattaci</a></li>
        </ul>
    </div>
    <section class="body">
        <nav class="directory-help" id="directoryHelp" aria-label="Percorso di navigazione"></nav>

        <div class="hero-content">
            <h1 class="hero-title" id="heroTitle">Assistenza</h1>
            <p class="hero-sub" id="herosubTitle">Organizza la tua riparazione con noi.</p>
        </div>

        <div class="device-picker" id="devicePicker">

            <div class="picker-row" id="deviceSummaryRow">
                <button class="picker-toggle" id="deviceSummaryToggle" aria-expanded="false"
                    aria-controls="deviceDetailRows">
                    <span class="label-toggle" id="deviceSummaryLabel">Selezione dispositivo </span>
                    <span class="toggle-chevron">></span>
                </button>
            </div>

            <div id="deviceDetailRows" hidden>
                <div class="picker-row">
                    <button class="picker-toggle" id="typeToggle" aria-expanded="false" aria-controls="typeList">
                        <span class="label-toggle" id="typeLabel">Seleziona il tipo di dispositivo </span>
                        <span class="toggle-chevron">></span>
                    </button>
                    <div class="option-list" id="typeList" hidden></div>
                </div>
                <div class="picker-row">
                    <button class="picker-toggle" id="brandToggle" aria-expanded="false" aria-controls="brandList"
                        disabled>
                        <span class="label-toggle" id="brandLabel">Seleziona la marca del dispositivo </span>
                        <span class="toggle-chevron">></span>

                    </button>
                    <div class="option-list" id="brandList" hidden></div>
                </div>
                <div class="picker-row">
                    <button class="picker-toggle" id="modelToggle" aria-expanded="false" aria-controls="modelList"
                        disabled>
                        <span class="label-toggle" id="modelLabel">Seleziona il modello del dispositivo </span>
                        <span class="toggle-chevron">></span>
                    </button>
                    <div class="option-list" id="modelList" hidden></div>
                </div>
            </div>

            <div class="picker-row">
                <button class="picker-toggle" id="personalToggle" aria-expanded="false" aria-controls="personalFields"
                    disabled>
                    <span class="label-toggle" id="peronalLabel">Informazioni personali </span>
                    <span class="toggle-chevron">></span>
                </button>

                <div class="personal-fields" id="personalFields" hidden>
                    <div class="field-group">
                        <label for="inputName">Nome</label>
                        <input type="text" id="inputName" placeholder="..." autocomplete="given-name">
                    </div>

                    <div class="field-group">
                        <label for="inputSurname">Cognome</label>
                        <input type="text" id="inputSurname" placeholder="..." autocomplete="family-name">
                    </div>
                    <div class="field-group">
                        <label for="inputPhone">Telefono</label>
                        <input type="tel" id="inputPhone" placeholder="..." autocomplete="tel" inputmode="tel" value="+39 ">
                    </div>
                </div>
            </div>

            <button class="device-confirm" id="confirm" disabled>Conferma</button>

        </div>
    </section>
</body>

</html>
